sessions:
  regular_only: true
  extended_enabled: false
  timezone: America/New_York

timeframes:
  live: [1m, 2m, 3m, 5m, 10m, 15m, 20m, 30m, 1h, 2h, 4h, 1D]
  derived: [1W, 1M, 1Q]
  anchors:
    1W: W-FRI
    1M: ME
    1Q: QE

signal:
  tolerance: 0.01
  trigger_mode: bar_touch
  volatility_percentile_threshold: 75.0

strategy:
  mode: author_v1
  price_basis: ohlc4
  trigger_mode: close_touch_or_cross
  strict_routing: true
  allow_same_bar_exit: false
  ambiguity_policy: fail
  routes:
    - id: qqq_1h_author
      symbol: QQQ
      timeframe: 1h
      outfit_id: base2_nvda
      key_period: 512
      side: LONG
      signal_type: optimized_buy
      micro_periods: [16, 32, 64, 128, 256]
      ignore_close_below_key_when_micro_positive: true
      macro_gate: nas
      risk_mode: singular_penny_only
      stop_offset: 0.01
      confluence:
        enabled: false
        min_outfit_alignment_count: 0
        volume_lookback_bars: 20
        volume_spike_ratio: 1.5
      atr:
        period: 14
        multiplier: 1.5
    - id: rwm_30m_author
      symbol: RWM
      timeframe: 30m
      outfit_id: svix_211
      key_period: 844
      side: LONG
      signal_type: magnetized_buy
      micro_periods: [26, 52, 116, 211, 422]
      ignore_close_below_key_when_micro_positive: false
      macro_gate: none
      risk_mode: singular_penny_only
      stop_offset: 0.01
      confluence:
        enabled: false
        min_outfit_alignment_count: 0
        volume_lookback_bars: 20
        volume_spike_ratio: 1.5
      atr:
        period: 14
        multiplier: 1.5

risk:
  long_break: 0.01
  short_break: 0.01
  partial_take_r: 1.0
  final_take_r: 3.0
  timeout_bars: 120
  migrations:
    AMDL:
      proxy_symbol: SMH
      break_level: 374.24
      mode: below
      offset: 0.01

archive:
  enabled: true
  root: artifacts

ingest:
  empty_source_policy: fail

live:
  runtime_minutes: null
  warmup_minutes: 480
  reconnect_max_attempts: 8
  reconnect_base_delay_seconds: 1.0
  reconnect_max_delay_seconds: 30.0
  stale_feed_seconds: 120
  heartbeat_interval_seconds: 20
  heartbeat_timeout_seconds: 10

storage_root: artifacts/storage
events_root: artifacts/events
outfits_path: src/sma_outfits/config/outfits.yaml
