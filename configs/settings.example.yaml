alpaca:
  base_url: https://paper-api.alpaca.markets
  data_url: https://data.alpaca.markets
  data_feed: iex
  adjustment: raw
  asof: "2025-01-01"
  crypto_loc: us

universe:
  symbols:
    - SPY
    - QQQ
    - DIA
    - UPRO
    - TQQQ
    - SQQQ
    - UDOW
    - SDOW
    - SOXL
    - SOXS
    - SVIX
    - VIXY
    - XLF
    - JPM
    - NVDA
    - TSLA
    - AMD
    - GME
    - SMH
    - FAS
    - FAZ
    - BTC/USD
    - ETH/USD
  proxy_map:
    SPX: SPY
    IXIC: QQQ
    NDX: QQQ
    DJI: DIA
    VIX: VIXY
  symbol_markets:
    SPY: stocks
    QQQ: stocks
    DIA: stocks
    UPRO: stocks
    TQQQ: stocks
    SQQQ: stocks
    UDOW: stocks
    SDOW: stocks
    SOXL: stocks
    SOXS: stocks
    SVIX: stocks
    VIXY: stocks
    XLF: stocks
    JPM: stocks
    NVDA: stocks
    TSLA: stocks
    AMD: stocks
    GME: stocks
    SMH: stocks
    FAS: stocks
    FAZ: stocks
    BTC/USD: crypto
    ETH/USD: crypto

sessions:
  regular_only: true
  extended_enabled: false
  timezone: America/New_York

timeframes:
  live: [1m, 2m, 3m, 5m, 10m, 15m, 20m, 30m, 1h, 2h, 4h, 1D]
  derived: [1W, 1M, 1Q]
  anchors:
    1W: W-FRI
    1M: ME
    1Q: QE

signal:
  tolerance: 0.01
  trigger_mode: bar_touch
  volatility_percentile_threshold: 75.0

risk:
  long_break: 0.01
  short_break: 0.01
  partial_take_r: 1.0
  final_take_r: 3.0
  timeout_bars: 120
  migrations:
    AMDL:
      proxy_symbol: SMH
      break_level: 374.24
      mode: below
      offset: 0.01

archive:
  enabled: true
  root: artifacts

ingest:
  empty_source_policy: fail

live:
  runtime_minutes: null
  warmup_minutes: 480
  reconnect_max_attempts: 8
  reconnect_base_delay_seconds: 1.0
  reconnect_max_delay_seconds: 30.0
  stale_feed_seconds: 120
  heartbeat_interval_seconds: 20
  heartbeat_timeout_seconds: 10

storage_root: artifacts/storage
events_root: artifacts/events
outfits_path: src/sma_outfits/config/outfits.yaml
