sessions:
  regular_only: true
  extended_enabled: false
  timezone: America/New_York

timeframes:
  live: [1m, 2m, 3m, 5m, 10m, 15m, 20m, 30m, 1h, 2h, 4h, 1D]
  derived: [1W, 1M, 1Q]
  anchors:
    1W: W-FRI
    1M: ME
    1Q: QE

signal:
  tolerance: 0.01
  trigger_mode: bar_touch
  volatility_percentile_threshold: 75.0

strategy:
  # Replication lane intentionally converges to context composition.
  price_basis: ohlc4
  trigger_mode: close_touch_or_cross
  strict_routing: true
  allow_same_bar_exit: false
  ambiguity_policy: fail
  routes:
    - id: qqq_1h_author
      symbol: QQQ
      timeframe: 1h
      outfit_id: base2_nvda
      key_period: 512
      side: LONG
      signal_type: optimized_buy
      micro_periods: [16, 32, 64, 128, 256]
      ignore_close_below_key_when_micro_positive: true
      macro_gate: nas
      risk_mode: penny_reference_break
      stop_offset: 0.01
      dynamic_reference_migration: true
      confluence:
        enabled: true
        min_outfit_alignment_count: 3
        volume_lookback_bars: 20
        volume_spike_ratio: 1.5
      atr:
        period: 14
        multiplier: 1.5
    - id: qqq_1h_author_short
